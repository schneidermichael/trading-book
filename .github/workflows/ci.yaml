name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main  # Triggers the workflow every time you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 1. Checkout the application source code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Docker Buildx (Enables advanced build features)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Log into Docker Hub using the secrets configured in Step 1
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. We capture the short 7-character Git SHA to use as a clean, human-readable image tag
    - name: Set short git SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    # 5. Build the Docker image and push it to Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        platforms: linux/arm64
        # This tags it with the unique git commit SHA and moves 'latest' forward
        tags: |
          michaelxschneider/trading-book:latest
          michaelxschneider/trading-book:${{ steps.vars.outputs.sha_short }}

    # 6. Checkout the SEPARATE GitOps Manifest Repository
    - name: Checkout GitOps Repository
      uses: actions/checkout@v4
      with:
        repository: 'schneidermichael/trading-book-gitops' 
        token: ${{ secrets.GITOPS_REPO_TOKEN }}
        persist-credentials: true              
        path: gitops-repo

    # 7. Add debug logging to see where the files are
    - name: Update Kubernetes Manifest
      run: |
        echo "=== Current working directory ==="
        pwd
        echo "=== Listing all files recursively ==="
        ls -R
        
        # Keep the sed command below it
        sed -i 's|image: michaelxschneider/trading-book:.*|image: michaelxschneider/trading-book:${{ steps.vars.outputs.sha_short }}|g' gitops-repo/deployment.yaml

    - name: Commit and Push Manifest Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add deployment.yaml
        git commit -m "chore: update image tag to ${{ steps.vars.outputs.sha_short }} [skip ci]"
        git push
  
